name: ICOS ERIC/CP Theme (Drupal 10)
type: theme
description: 'ICOS ERIC/CP theme, created 2025, for Drupal 10 and beyond.' 
core_version_requirement: ^10.3 || ^11
base theme: bootstrap

libraries:
  - cp_theme_d10/global-styling
  - cp_theme_d10/bootstrap
  - cp_theme_d10/freshdesk
  - cp_theme_d10/cookie-consent

regions:
  above_header: 'Above the header'
  header: 'Header (left)'
  header_right: 'Header (right)'
  primary_menu: 'Primary menu'
  above_content: 'Above content (hero image)'
  breadcrumb: Breadcrumb
  content: Content
  footer_top: 'Footer top'
  footer_first: 'Footer first column'
  footer_second: 'Footer second column'
  footer_third: 'Footer third column'
  footer_fourth: 'Footer fourth column'
  footer_bottom_first: 'Footer bottom first column'
  footer_bottom_second: 'Footer bottom second-fourth column'
  none: None
