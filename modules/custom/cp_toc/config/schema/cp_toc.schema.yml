# Schema for third-party settings stored on node types.
node.type.*.third_party.cp_toc:
  type: mapping
  label: 'CP Table of contents – node-type settings'
  mapping:
    enabled:
      type: boolean
      label: 'Enable TOC'
    headings:
      type: string
      label: 'Heading selectors (comma-separated CSS selectors)'
    title:
      type: label
      label: 'TOC title'
    title_classes:
      type: string
      label: 'Title CSS classes'
    list_classes:
      type: string
      label: 'List container CSS classes'
    list_item_classes:
      type: string
      label: 'List item CSS classes'
    link_classes:
      type: string
      label: 'TOC link CSS classes'
    min_headings:
      type: integer
      label: 'Minimum headings required to show TOC'
    smooth_scroll:
      type: boolean
      label: 'Enable smooth scrolling'
    scroll_offset:
      type: integer
      label: 'Scroll offset in pixels'
    node_default_enabled:
      type: boolean
      label: 'Enable TOC by default on new content'

# Schema for the block plugin configuration.
block.settings.cp_toc_block:
  type: block_settings
  label: 'CP Table of contents – block settings'
  mapping:
    override_nodetype:
      type: boolean
      label: 'Override content-type settings'
    headings:
      type: string
      label: 'Heading selectors'
    title:
      type: label
      label: 'TOC title'
    title_classes:
      type: string
      label: 'Title CSS classes'
    list_classes:
      type: string
      label: 'List container CSS classes'
    list_item_classes:
      type: string
      label: 'List item CSS classes'
    link_classes:
      type: string
      label: 'TOC link CSS classes'
    min_headings:
      type: integer
      label: 'Minimum headings'
    smooth_scroll:
      type: boolean
      label: 'Smooth scrolling'
    scroll_offset:
      type: integer
      label: 'Scroll offset'
